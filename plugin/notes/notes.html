<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Anna.js — Speaker View</title>
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
				background: #1a1b26;
				color: #c0caf5;
				overflow: hidden;
				height: 100vh;
			}

			/* --- Grid Layout --- */
			.speaker-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: auto 1fr auto;
				height: 100vh;
				gap: 0;
			}

			/* --- Top Bar --- */
			.top-bar {
				grid-column: 1 / -1;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 8px 16px;
				background: #16161e;
				border-bottom: 1px solid #2a2b3d;
				font-size: 13px;
			}

			.top-bar .progress-info {
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.slide-counter {
				font-size: 14px;
				font-weight: 600;
				color: #7aa2f7;
			}

			.progress-bar-container {
				width: 200px;
				height: 4px;
				background: #2a2b3d;
				border-radius: 2px;
				overflow: hidden;
			}

			.progress-bar-fill {
				height: 100%;
				background: #7aa2f7;
				border-radius: 2px;
				transition: width 0.3s ease;
			}

			.layout-selector {
				display: flex;
				gap: 6px;
			}

			.layout-btn {
				background: #2a2b3d;
				border: 1px solid #3b3d57;
				color: #787c99;
				padding: 4px 10px;
				border-radius: 4px;
				cursor: pointer;
				font-size: 12px;
			}

			.layout-btn.active {
				background: #3b3d57;
				color: #c0caf5;
			}

			/* --- Slide Previews --- */
			.slide-current, .slide-upcoming {
				position: relative;
				overflow: hidden;
			}

			.slide-current {
				border-right: 1px solid #2a2b3d;
			}

			.slide-label {
				position: absolute;
				top: 8px;
				left: 12px;
				z-index: 2;
				background: rgba(26, 27, 38, 0.85);
				color: #787c99;
				padding: 3px 10px;
				border-radius: 4px;
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.slide-current iframe, .slide-upcoming iframe {
				width: 100%;
				height: 100%;
				border: none;
			}

			/* --- Bottom Panel --- */
			.bottom-panel {
				grid-column: 1 / -1;
				display: grid;
				grid-template-columns: 1fr 2fr 1fr;
				border-top: 1px solid #2a2b3d;
				background: #16161e;
				min-height: 180px;
				max-height: 35vh;
			}

			/* --- Timers --- */
			.timers {
				padding: 16px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				border-right: 1px solid #2a2b3d;
			}

			.timer-block {
				display: flex;
				flex-direction: column;
			}

			.timer-label {
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.8px;
				color: #565f89;
				margin-bottom: 2px;
			}

			.timer-value {
				font-size: 1.8em;
				font-weight: 700;
				font-variant-numeric: tabular-nums;
				font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
				line-height: 1.2;
			}

			.timer-elapsed { color: #c0caf5; }

			.timer-countdown { color: #9ece6a; cursor: pointer; }
			.timer-countdown:hover { opacity: 0.8; }
			.timer-countdown.warning { color: #e0af68; }
			.timer-countdown.danger { color: #f7768e; }
			.timer-countdown.overtime { color: #f7768e; animation: pulse 1s ease infinite; }

			@keyframes pulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.5; }
			}

			.timer-slide {
				color: #787c99;
				font-size: 1.1em;
			}

			.timer-clock {
				color: #565f89;
				font-size: 1em;
			}

			.timer-set-hint {
				font-size: 10px;
				color: #565f89;
				margin-top: 2px;
			}

			/* --- Notes --- */
			.notes-panel {
				padding: 16px;
				overflow-y: auto;
			}

			.notes-label {
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.8px;
				color: #565f89;
				margin-bottom: 8px;
			}

			.notes-content {
				font-size: 15px;
				line-height: 1.6;
				color: #a9b1d6;
			}

			.notes-content:empty::after {
				content: 'No notes for this slide';
				color: #3b3d57;
				font-style: italic;
			}

			.notes-content a { color: #7aa2f7; }
			.notes-content code {
				background: #2a2b3d;
				padding: 2px 6px;
				border-radius: 3px;
				font-size: 0.9em;
			}
			.notes-content ul, .notes-content ol {
				padding-left: 20px;
				margin: 8px 0;
			}

			/* --- Slide Time Stats --- */
			.stats-panel {
				padding: 16px;
				border-left: 1px solid #2a2b3d;
				overflow-y: auto;
			}

			.stats-label {
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.8px;
				color: #565f89;
				margin-bottom: 8px;
			}

			.slide-time-list {
				list-style: none;
				font-size: 12px;
				font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
			}

			.slide-time-list li {
				display: flex;
				justify-content: space-between;
				padding: 3px 0;
				color: #565f89;
				border-bottom: 1px solid #1a1b26;
			}

			.slide-time-list li.active {
				color: #7aa2f7;
				font-weight: 600;
			}

			.slide-time-list .slide-num { min-width: 50px; }
			.slide-time-list .slide-dur { text-align: right; }

			/* --- Connection Status --- */
			#connection-status {
				position: fixed;
				top: 0; left: 0; right: 0; bottom: 0;
				z-index: 100;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #1a1b26;
				color: #565f89;
				font-size: 16px;
			}

			#connection-status.hidden { display: none; }

			/* --- Countdown Modal --- */
			.countdown-modal {
				display: none;
				position: fixed;
				top: 0; left: 0; right: 0; bottom: 0;
				z-index: 50;
				background: rgba(0,0,0,0.7);
				align-items: center;
				justify-content: center;
			}

			.countdown-modal.visible { display: flex; }

			.countdown-modal-inner {
				background: #24283b;
				border-radius: 12px;
				padding: 32px;
				text-align: center;
				min-width: 300px;
			}

			.countdown-modal h3 {
				font-size: 16px;
				color: #c0caf5;
				margin-bottom: 16px;
			}

			.countdown-modal input {
				background: #1a1b26;
				border: 1px solid #3b3d57;
				color: #c0caf5;
				padding: 10px 16px;
				border-radius: 6px;
				font-size: 24px;
				width: 120px;
				text-align: center;
				font-family: 'SF Mono', Menlo, monospace;
				outline: none;
			}

			.countdown-modal input:focus {
				border-color: #7aa2f7;
			}

			.countdown-modal .unit {
				color: #787c99;
				font-size: 14px;
				margin-left: 8px;
			}

			.countdown-modal .modal-actions {
				margin-top: 20px;
				display: flex;
				gap: 10px;
				justify-content: center;
			}

			.countdown-modal button {
				padding: 8px 20px;
				border-radius: 6px;
				border: none;
				cursor: pointer;
				font-size: 14px;
			}

			.btn-primary {
				background: #7aa2f7;
				color: #1a1b26;
				font-weight: 600;
			}

			.btn-secondary {
				background: #2a2b3d;
				color: #787c99;
			}
		</style>
	</head>

	<body>
		<div id="connection-status">Connecting to presentation...</div>

		<div class="speaker-grid">
			<!-- Top Bar -->
			<div class="top-bar">
				<div class="progress-info">
					<span class="slide-counter">Slide 1 / 1</span>
					<div class="progress-bar-container">
						<div class="progress-bar-fill" style="width: 0%"></div>
					</div>
				</div>
				<div class="layout-selector">
					<button class="layout-btn active" data-layout="default">Default</button>
					<button class="layout-btn" data-layout="wide">Wide</button>
					<button class="layout-btn" data-layout="notes">Notes</button>
				</div>
			</div>

			<!-- Slide Previews -->
			<div class="slide-current">
				<span class="slide-label">Current</span>
			</div>
			<div class="slide-upcoming">
				<span class="slide-label">Next</span>
			</div>

			<!-- Bottom Panel -->
			<div class="bottom-panel">
				<div class="timers">
					<div class="timer-block">
						<span class="timer-label">Elapsed</span>
						<span class="timer-value timer-elapsed">00:00</span>
					</div>
					<div class="timer-block">
						<span class="timer-label">Countdown</span>
						<span class="timer-value timer-countdown" title="Click to set duration">--:--</span>
						<span class="timer-set-hint">Click to set</span>
					</div>
					<div class="timer-block">
						<span class="timer-label">On this slide</span>
						<span class="timer-value timer-slide">0:00</span>
					</div>
					<div class="timer-block">
						<span class="timer-label">Clock</span>
						<span class="timer-value timer-clock"></span>
					</div>
				</div>

				<div class="notes-panel">
					<div class="notes-label">Notes</div>
					<div class="notes-content"></div>
				</div>

				<div class="stats-panel">
					<div class="stats-label">Time per slide</div>
					<ul class="slide-time-list"></ul>
				</div>
			</div>
		</div>

		<!-- Countdown Setup Modal -->
		<div class="countdown-modal">
			<div class="countdown-modal-inner">
				<h3>Set Presentation Duration</h3>
				<div>
					<input type="number" class="countdown-input" min="1" max="480" value="30" placeholder="30">
					<span class="unit">minutes</span>
				</div>
				<div class="modal-actions">
					<button class="btn-secondary countdown-clear">Clear</button>
					<button class="btn-primary countdown-start">Start</button>
				</div>
			</div>
		</div>

		<script src="../../plugin/markdown/marked.js"></script>
		<script>
		(function() {

			// --- State ---
			var connected = false,
				currentState = null,
				pendingCalls = {},
				lastCallId = 0,
				startTime = new Date(),
				slideStartTime = new Date(),
				countdownDuration = null,   // ms, null = not set
				countdownStart = null,
				slideTimings = {},          // { "h.v": totalMs }
				currentSlideKey = '0.0',
				totalSlides = 1;

			// --- DOM ---
			var connectionStatus = document.getElementById('connection-status');
			var currentSlideEl, upcomingSlideEl;
			var elapsedEl = document.querySelector('.timer-elapsed');
			var countdownEl = document.querySelector('.timer-countdown');
			var slideTimerEl = document.querySelector('.timer-slide');
			var clockEl = document.querySelector('.timer-clock');
			var notesEl = document.querySelector('.notes-content');
			var slideCounterEl = document.querySelector('.slide-counter');
			var progressFillEl = document.querySelector('.progress-bar-fill');
			var slideTimeListEl = document.querySelector('.slide-time-list');
			var countdownModal = document.querySelector('.countdown-modal');
			var countdownInput = document.querySelector('.countdown-input');

			// --- Restore from localStorage ---
			try {
				var saved = localStorage.getItem('anna-speaker-countdown');
				if (saved) {
					var d = JSON.parse(saved);
					countdownDuration = d.duration;
					countdownStart = new Date(d.start);
				}
				var savedStart = localStorage.getItem('anna-speaker-start');
				if (savedStart) startTime = new Date(savedStart);
			} catch(e) {}

			// --- Countdown Modal ---
			countdownEl.addEventListener('click', function() {
				countdownModal.classList.add('visible');
				countdownInput.focus();
				countdownInput.select();
			});

			document.querySelector('.countdown-start').addEventListener('click', function() {
				var minutes = parseInt(countdownInput.value);
				if (minutes > 0) {
					countdownDuration = minutes * 60 * 1000;
					countdownStart = new Date();
					startTime = new Date();
					try {
						localStorage.setItem('anna-speaker-countdown', JSON.stringify({
							duration: countdownDuration, start: countdownStart.toISOString()
						}));
						localStorage.setItem('anna-speaker-start', startTime.toISOString());
					} catch(e) {}
				}
				countdownModal.classList.remove('visible');
			});

			document.querySelector('.countdown-clear').addEventListener('click', function() {
				countdownDuration = null;
				countdownStart = null;
				countdownEl.textContent = '--:--';
				countdownEl.className = 'timer-value timer-countdown';
				document.querySelector('.timer-set-hint').textContent = 'Click to set';
				try { localStorage.removeItem('anna-speaker-countdown'); } catch(e) {}
				countdownModal.classList.remove('visible');
			});

			countdownInput.addEventListener('keydown', function(e) {
				if (e.key === 'Enter') document.querySelector('.countdown-start').click();
				if (e.key === 'Escape') countdownModal.classList.remove('visible');
			});

			// --- Layout ---
			var layoutBtns = document.querySelectorAll('.layout-btn');
			layoutBtns.forEach(function(btn) {
				btn.addEventListener('click', function() {
					layoutBtns.forEach(function(b) { b.classList.remove('active'); });
					btn.classList.add('active');
					applyLayout(btn.getAttribute('data-layout'));
				});
			});

			function applyLayout(layout) {
				var grid = document.querySelector('.speaker-grid');
				var current = document.querySelector('.slide-current');
				var upcoming = document.querySelector('.slide-upcoming');
				var bottom = document.querySelector('.bottom-panel');

				if (layout === 'wide') {
					grid.style.gridTemplateColumns = '1fr 1fr';
					grid.style.gridTemplateRows = 'auto 1fr auto';
					current.style.display = '';
					upcoming.style.display = '';
					bottom.style.gridTemplateColumns = '1fr 2fr 1fr';
				} else if (layout === 'notes') {
					current.style.display = 'none';
					upcoming.style.display = 'none';
					bottom.style.gridTemplateColumns = '250px 1fr 200px';
					grid.style.gridTemplateRows = 'auto 0 1fr';
				} else {
					grid.style.gridTemplateColumns = '1fr 1fr';
					grid.style.gridTemplateRows = 'auto 1fr auto';
					current.style.display = '';
					upcoming.style.display = '';
					bottom.style.gridTemplateColumns = '1fr 2fr 1fr';
				}
				try { localStorage.setItem('anna-speaker-layout', layout); } catch(e) {}
			}

			try {
				var savedLayout = localStorage.getItem('anna-speaker-layout');
				if (savedLayout) {
					layoutBtns.forEach(function(b) {
						b.classList.toggle('active', b.getAttribute('data-layout') === savedLayout);
					});
					applyLayout(savedLayout);
				}
			} catch(e) {}

			// --- Timer Update (every second) ---
			setInterval(updateTimers, 1000);
			updateTimers();

			function updateTimers() {
				var now = new Date();

				// Elapsed
				var elapsed = now - startTime;
				elapsedEl.textContent = formatTime(elapsed);

				// Clock
				clockEl.textContent = now.toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });

				// Slide timer
				var onSlide = now - slideStartTime;
				slideTimerEl.textContent = formatTime(onSlide);

				// Countdown
				if (countdownDuration && countdownStart) {
					var remaining = countdownDuration - (now - countdownStart);
					countdownEl.textContent = formatTime(Math.abs(remaining));
					document.querySelector('.timer-set-hint').textContent = '';

					if (remaining < 0) {
						countdownEl.className = 'timer-value timer-countdown overtime';
						countdownEl.textContent = '-' + formatTime(Math.abs(remaining));
					} else if (remaining < countdownDuration * 0.15) {
						countdownEl.className = 'timer-value timer-countdown danger';
					} else if (remaining < countdownDuration * 0.35) {
						countdownEl.className = 'timer-value timer-countdown warning';
					} else {
						countdownEl.className = 'timer-value timer-countdown';
						countdownEl.style.color = '#9ece6a';
					}
				}

				// Update slide timings for current slide
				if (slideTimings[currentSlideKey] === undefined) {
					slideTimings[currentSlideKey] = 0;
				}
			}

			function formatTime(ms) {
				var totalSec = Math.floor(Math.abs(ms) / 1000);
				var min = Math.floor(totalSec / 60);
				var sec = totalSec % 60;
				if (min >= 60) {
					var hr = Math.floor(min / 60);
					min = min % 60;
					return hr + ':' + pad(min) + ':' + pad(sec);
				}
				return min + ':' + pad(sec);
			}

			function pad(n) { return n < 10 ? '0' + n : '' + n; }

			// --- Slide Time Tracking ---
			function onSlideChanged(state) {
				var now = new Date();
				var timeOnPrevSlide = now - slideStartTime;

				// Record time on previous slide
				if (!slideTimings[currentSlideKey]) slideTimings[currentSlideKey] = 0;
				slideTimings[currentSlideKey] += timeOnPrevSlide;

				// Reset for new slide
				var newKey = state.indexh + '.' + (state.indexv || 0);
				currentSlideKey = newKey;
				slideStartTime = now;

				updateSlideTimeList(state);
			}

			function updateSlideTimeList(state) {
				var html = '';
				for (var key in slideTimings) {
					var parts = key.split('.');
					var label = 'Slide ' + (parseInt(parts[0]) + 1);
					if (parseInt(parts[1]) > 0) label += '.' + (parseInt(parts[1]) + 1);
					var isActive = key === currentSlideKey;
					html += '<li class="' + (isActive ? 'active' : '') + '">' +
						'<span class="slide-num">' + label + '</span>' +
						'<span class="slide-dur">' + formatTime(slideTimings[key]) + '</span>' +
						'</li>';
				}
				// Add current slide if not yet in timings
				if (!slideTimings[currentSlideKey]) {
					var parts = currentSlideKey.split('.');
					var label = 'Slide ' + (parseInt(parts[0]) + 1);
					if (parseInt(parts[1]) > 0) label += '.' + (parseInt(parts[1]) + 1);
					html += '<li class="active"><span class="slide-num">' + label + '</span>' +
						'<span class="slide-dur">0:00</span></li>';
				}
				slideTimeListEl.innerHTML = html;
				// Auto-scroll to bottom
				slideTimeListEl.parentNode.scrollTop = slideTimeListEl.parentNode.scrollHeight;
			}

			// --- Update Progress ---
			function updateProgress(state) {
				callAnnaApi('getSlidePastCount', [], function(past) {
					callAnnaApi('getTotalSlides', [], function(total) {
						totalSlides = total;
						var current = past + 1;
						slideCounterEl.textContent = 'Slide ' + current + ' / ' + total;
						progressFillEl.style.width = ((current / total) * 100) + '%';
					});
				});
			}

			// --- Communication ---
			window.addEventListener('message', function(event) {
				var data;
				try { data = JSON.parse(event.data); } catch(e) { return; }

				if (data && data.namespace === 'anna-notes') {
					if (data.type === 'connect') handleConnect(data);
					else if (data.type === 'state') handleState(data);
					else if (data.type === 'return') {
						if (pendingCalls[data.callId]) {
							pendingCalls[data.callId](data.result);
							delete pendingCalls[data.callId];
						}
					}
				}
				else if (data && data.namespace === 'anna') {
					if (/ready/.test(data.eventName)) {
						window.opener.postMessage(JSON.stringify({
							namespace: 'anna-notes', type: 'connected'
						}), '*');
					}
					else if (/slidechanged|fragmentshown|fragmenthidden|paused|resumed/.test(data.eventName) &&
						currentState !== JSON.stringify(data.state)) {
						window.opener.postMessage(JSON.stringify({
							method: 'setState', args: [data.state]
						}), '*');
					}
				}
			});

			function callAnnaApi(method, args, callback) {
				var id = ++lastCallId;
				pendingCalls[id] = callback;
				window.opener.postMessage(JSON.stringify({
					namespace: 'anna-notes', type: 'call',
					callId: id, methodName: method, arguments: args
				}), '*');
			}

			var connectionTimeout = setTimeout(function() {
				connectionStatus.textContent = 'Connection failed. Close and reopen speaker view.';
			}, 5000);

			function handleConnect(data) {
				if (connected) return;
				connected = true;
				clearTimeout(connectionTimeout);
				connectionStatus.classList.add('hidden');

				setupIframes(data);
				setupKeyboard();
			}

			var prevState = null;
			function handleState(data) {
				currentState = JSON.stringify(data.state);

				// Detect slide change
				if (!prevState || prevState.indexh !== data.state.indexh || prevState.indexv !== data.state.indexv) {
					if (prevState) onSlideChanged(data.state);
					else {
						currentSlideKey = data.state.indexh + '.' + (data.state.indexv || 0);
						updateSlideTimeList(data.state);
					}
					prevState = { indexh: data.state.indexh, indexv: data.state.indexv };
				}

				// Notes
				if (data.notes) {
					if (data.markdown && typeof marked !== 'undefined') {
						notesEl.innerHTML = marked(data.notes);
					} else {
						notesEl.innerHTML = data.notes;
					}
				} else {
					notesEl.innerHTML = '';
				}

				// Update iframes
				if (currentSlideEl) {
					currentSlideEl.contentWindow.postMessage(JSON.stringify({ method: 'setState', args: [data.state] }), '*');
				}
				if (upcomingSlideEl) {
					upcomingSlideEl.contentWindow.postMessage(JSON.stringify({ method: 'setState', args: [data.state] }), '*');
					upcomingSlideEl.contentWindow.postMessage(JSON.stringify({ method: 'next' }), '*');
				}

				updateProgress(data.state);
			}

			// Debounce state updates
			handleState = (function(fn, ms) {
				var lastTime = 0, timeout;
				return function() {
					var args = arguments, ctx = this;
					clearTimeout(timeout);
					var since = Date.now() - lastTime;
					if (since > ms) { fn.apply(ctx, args); lastTime = Date.now(); }
					else { timeout = setTimeout(function() { fn.apply(ctx, args); lastTime = Date.now(); }, ms - since); }
				};
			})(handleState, 200);

			function setupIframes(data) {
				var params = ['receiver', 'progress=false', 'history=false',
					'transition=none', 'autoSlide=0', 'backgroundTransition=none'].join('&');
				var sep = /\?/.test(data.url) ? '&' : '?';
				var hash = '#/' + data.state.indexh + '/' + data.state.indexv;

				currentSlideEl = document.createElement('iframe');
				currentSlideEl.setAttribute('src', data.url + sep + params + '&postMessageEvents=true' + hash);
				document.querySelector('.slide-current').appendChild(currentSlideEl);

				upcomingSlideEl = document.createElement('iframe');
				upcomingSlideEl.setAttribute('src', data.url + sep + params + '&controls=false' + hash);
				document.querySelector('.slide-upcoming').appendChild(upcomingSlideEl);
			}

			function setupKeyboard() {
				document.addEventListener('keydown', function(event) {
					// Block F5 / Cmd+R
					if (event.keyCode === 116 || (event.metaKey && event.keyCode === 82)) {
						event.preventDefault();
						return false;
					}
					if (currentSlideEl) {
						currentSlideEl.contentWindow.postMessage(JSON.stringify({
							method: 'triggerKey', args: [event.keyCode]
						}), '*');
					}
				});
			}

		})();
		</script>
	</body>
</html>
